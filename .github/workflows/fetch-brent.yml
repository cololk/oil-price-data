name: Fetch Brent Oil Price

on:
  schedule:
    - cron: '0 1,9 * * *'  # 每天台灣時間 09:00 和 17:00
  workflow_dispatch:        # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Brent price
        run: |
          python3 - <<'EOF'
          import urllib.request, json, time

          def try_source(url, parse_fn):
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                return parse_fn(json.loads(r.read()))
            except:
              return None

          # Source 1: Yahoo Finance BZ=F via allorigins
          yf_url = 'https://api.allorigins.win/get?url=' + urllib.request.quote(
            'https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?range=5d&interval=1d'
          )
          def parse_yf(d):
            j = json.loads(d['contents'])
            r = j['chart']['result'][0]
            price = r['meta'].get('regularMarketPrice')
            closes = [v for v in r['indicators']['quote'][0]['close'] if v]
            if not price: price = closes[-1] if closes else None
            prev = closes[-2] if len(closes) >= 2 else None
            if price and 30 < price < 350:
              return {'price': round(price, 2), 'prev': round(prev, 2) if prev else None}
          result = try_source(yf_url, parse_yf)

          # Source 2: WTI + 3 estimate
          if not result:
            wti_url = 'https://api.allorigins.win/get?url=' + urllib.request.quote(
              'https://query1.finance.yahoo.com/v8/finance/chart/CL=F?range=5d&interval=1d'
            )
            def parse_wti(d):
              j = json.loads(d['contents'])
              r = j['chart']['result'][0]
              price = r['meta'].get('regularMarketPrice')
              closes = [v for v in r['indicators']['quote'][0]['close'] if v]
              if not price: price = closes[-1] if closes else None
              prev = closes[-2] if len(closes) >= 2 else None
              if price and 30 < price+3 < 350:
                return {'price': round(price+3, 2), 'prev': round(prev+3, 2) if prev else None}
            result = try_source(wti_url, parse_wti)

          if not result:
            raise Exception('All sources failed')

          output = {
            'price': result['price'],
            'prev': result.get('prev'),
            'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            'date': time.strftime('%Y-%m-%d', time.gmtime()),
            'source': 'github-actions'
          }
          with open('brent.json', 'w') as f:
            json.dump(output, f)
          print('Done:', output)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brent.json
          git diff --cached --quiet || git commit -m "update brent price $(date -u +%Y-%m-%d)"
          git push
